<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𐌔𐋅𐌀𐋅Ꮤ𐌀𐌉Ɀ</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" type="image/jpeg" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {background: #eef2f7; font-family: "Segoe UI", sans-serif;}
.card {border-radius: 18px;}
canvas {max-height: 420px;}
table input {width: 100%; border: none; text-align: center;}
table input:focus {outline: none;}
.small-text {font-size: 14px; color: #555;}
.summary {background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 10px;}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">Advanced Statistical Graph Solution (Beta) </span>
</div>
</nav>

<div class="container my-4">
<div class="row g-4">

<div class="col-lg-4">
<div class="card p-3 shadow">
<h5>Select Statistical Tool</h5>
<select id="graphType" class="form-select mb-3" onchange="renderForm(); addGuide(this.value);">
<option value="fd">Frequency Distribution Table</option>
<option value="simpleBar">Simple Bar Diagram</option>
<option value="multipleBar">Multiple Bar Diagram</option>
<option value="componentBar">Component Bar Diagram</option>
<option value="histogram">Histogram</option>
<option value="polygon">Frequency Polygon</option>
<option value="ogive">Ogive</option>
<option value="timeSeries">Time Series</option>
<option value="pie">Pie Chart</option>
<option value="stemLeaf">Stem & Leaf</option>
</select>
<div id="inputArea"></div>
<button class="btn btn-primary w-100 mt-3" onclick="generate()">Generate Solution</button>
</div>
</div>

<div class="col-lg-8">
<div class="card p-3 shadow">
<div id="solutionArea"></div>
<canvas id="chartCanvas"></canvas>
<div id="guide" class="mt-4"></div>
</div>
</div>

</div>
</div>

<script>
let chart;

// Initial load
renderForm();
addGuide('fd');

function renderForm(){
    let type = document.getElementById('graphType').value;
    let area = document.getElementById('inputArea');
    area.innerHTML = "";

    // Frequency Distribution
    if(type==='fd'){
        area.innerHTML = `<label>Enter Raw Data (comma separated)</label>
            <textarea id='rawFD' class='form-control mb-2' placeholder="Example: 12,15,18,20"></textarea>`;
    }

    // Simple Bar / Pie
    if(['simpleBar','pie'].includes(type)){
        area.innerHTML = `<label>Enter Categories and Frequencies</label>
            <table class='table table-bordered text-center'>
                <thead><tr><th>Category</th><th>Frequency</th></tr></thead>
                <tbody id='simpleTable'>
                    <tr><td><input></td><td><input type='number'></td></tr>
                </tbody>
            </table>
            <button class='btn btn-sm btn-secondary w-100' onclick='addRow("simpleTable",2)'>Add Row</button>`;
    }

    // Multiple / Component Bar Diagram
    if(['multipleBar','componentBar'].includes(type)){
        area.innerHTML = `<label>Enter Categories and Dataset Values</label>
            <table class='table table-bordered text-center'>
                <thead id="multiHeader">
                    <tr><th>Category</th><th>Dataset 1</th></tr>
                </thead>
                <tbody id='multiTable'>
                    <tr><td><input></td><td><input type='number'></td></tr>
                </tbody>
            </table>
            <button class='btn btn-sm btn-secondary w-100 mb-1' onclick='addRow("multiTable",2)'>Add Row</button>
            <button class='btn btn-sm btn-secondary w-100' onclick='addDataset()'>Add Dataset Column</button>`;
        datasetCount = 1; // keep track of datasets
    }

    // Histogram / Polygon / Ogive
    if(['histogram','polygon','ogive'].includes(type)){
        area.innerHTML = `<label>Enter Raw Data (comma separated)</label>
            <textarea id='groupRawData' class='form-control mb-2' placeholder="Example: 12,15,18,20"></textarea>`;
    }

    // Stem & Leaf
    if(type==='stemLeaf'){
        area.innerHTML = `<label>Enter Raw Data (comma separated)</label>
            <textarea id='stemData' class='form-control mb-2' placeholder="Example: 12,15,18,20"></textarea>`;
    }
}

let datasetCount = 1;
function addDataset(){
    datasetCount++;
    let header = document.getElementById("multiHeader").rows[0];
    let th = document.createElement("th");
    th.innerText = "Dataset " + datasetCount;
    header.appendChild(th);

    let table = document.getElementById("multiTable");
    for(let row of table.rows){
        let td = row.insertCell();
        td.innerHTML = "<input type='number'>";
    }
}

function addRow(id,cols){
    let t = document.getElementById(id);
    let r = t.insertRow();
    for(let i=0;i<cols;i++){
        let c = r.insertCell();
        c.innerHTML = i===0?"<input>":"<input type='number'>";
    }
}

// Main generate function
function generate(){
    if(chart) chart.destroy();
    let type = document.getElementById('graphType').value;
    let ctx = document.getElementById('chartCanvas');
    let sol = document.getElementById('solutionArea');
    sol.innerHTML = "";

    // ---------------- FD ----------------
    if(type==='fd'){
        let raw = document.getElementById('rawFD').value.split(',')
                  .map(Number).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
        if(raw.length===0) return alert("Enter raw data");

        let n = raw.length;
        let k = Math.ceil(1+3.322*Math.log10(n));
        let min = Math.min(...raw);
        let max = Math.max(...raw);
        let width = Math.ceil((max-min)/k);

        let lower=[], upper=[], freq=[], tally=[];
        for(let i=0;i<k;i++){
            lower[i] = min + i*width;
            upper[i] = lower[i] + width;
            freq[i] = 0; tally[i]='';
        }

        raw.forEach(v=>{
            for(let i=0;i<k;i++){
                if(v>=lower[i] && v<upper[i]){ freq[i]++; tally[i]+='|'; break; }
                if(i===k-1 && v===max){ freq[i]++; tally[i]+='|';}
            }
        });

        let mid=[], cf=[], rf=[], cum=0, total=freq.reduce((a,b)=>a+b,0);
        for(let i=0;i<k;i++){
            mid[i] = (lower[i]+upper[i])/2;
            cum += freq[i];
            cf[i] = cum;
            rf[i] = ((freq[i]/total)*100).toFixed(2);
        }

        let mean = (mid.reduce((s,m,i)=>s + m*freq[i],0)/total).toFixed(2);
        let medianIndex = cf.findIndex(c=>c>=total/2);
        let L = lower[medianIndex], F = freq[medianIndex];
        let CF_before = medianIndex===0?0:cf[medianIndex-1];
        let median = (L + ((total/2 - CF_before)/F)*width).toFixed(2);
        let modalIndex = freq.indexOf(Math.max(...freq));
        let f1=freq[modalIndex], f0=modalIndex===0?0:freq[modalIndex-1], f2=modalIndex===k-1?0:freq[modalIndex+1];
        let mode = (lower[modalIndex] + ((f1-f0)/((f1-f0)+(f1-f2)))*width).toFixed(2);

        sol.innerHTML = `<div class="summary">
            <h6>Step-by-Step Calculations</h6>
            <p>Number of data points n = ${n}</p>
            <p>Number of classes k = ${k} (Sturges formula: 1 + 3.322 log10 n)</p>
            <p>Class width w = ${width} (Range/Classes)</p>
            <p>Mean = ${mean}, Median = ${median}, Mode = ${mode}</p>
        </div>
        <h5>Frequency Distribution Table</h5>
        <table class='table table-bordered text-center'>
            <thead><tr><th>Class</th><th>Tally</th><th>F</th><th>Mid</th><th>CF</th><th>RF%</th></tr></thead>
            <tbody>${lower.map((l,i)=>`<tr>
                <td>${l}-${upper[i]}</td>
                <td>${tally[i]}</td>
                <td>${freq[i]}</td>
                <td>${mid[i]}</td>
                <td>${cf[i]}</td>
                <td>${rf[i]}%</td>
            </tr>`).join('')}</tbody>
        </table>`;

        chart = new Chart(ctx,{
            type:'bar',
            data:{
                labels: lower.map((l,i)=>`${l}-${upper[i]}`),
                datasets:[{label:'Frequency', data:freq, backgroundColor:'rgba(54,162,235,0.5)', borderColor:'rgba(54,162,235,1)', borderWidth:1}]
            },
            options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, precision:0}}}
        });
    }

    // ---------------- Simple / Pie ----------------
    if(['simpleBar','pie'].includes(type)){
        let table = document.getElementById('simpleTable');
        let labels=[], data=[];
        for(let i=0;i<table.rows.length;i++){
            let cells = table.rows[i].cells;
            let label = cells[0].querySelector('input').value;
            let val = Number(cells[1].querySelector('input').value);
            if(label && !isNaN(val)){labels.push(label); data.push(val);}
        }
        if(labels.length===0) return alert("Enter data");

        let total = data.reduce((a,b)=>a+b,0);
        let percentages = data.map(d=>(d/total*100).toFixed(2));
        let angles = percentages.map(p=>(p*360/100).toFixed(2));

        chart = new Chart(ctx,{
            type: type==='simpleBar'?'bar':'pie',
            data:{
                labels:labels,
                datasets:[{
                    label:'Frequency',
                    data:data,
                    backgroundColor:labels.map(()=>`rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.5)`),
                    borderColor:labels.map(()=>`rgba(0,0,0,0.8)`),
                    borderWidth:1
                }]
            },
            options:{responsive:true, plugins:{legend:{position:'right'}}}
        });

        sol.innerHTML = `<h5>${type==='simpleBar'?'Simple Bar Diagram':'Pie Chart'}</h5>
            <table class='table table-bordered text-center'>
                <thead><tr><th>Category</th><th>Frequency</th><th>%</th><th>Angle (°)</th></tr></thead>
                <tbody>${labels.map((l,i)=>`<tr>
                    <td>${l}</td>
                    <td>${data[i]}</td>
                    <td>${percentages[i]}%</td>
                    <td>${angles[i]}°</td>
                </tr>`).join('')}</tbody>
            </table>`;
    }

    // ---------------- Multiple / Component Bar ----------------
    if(['multipleBar','componentBar'].includes(type)){
        let table = document.getElementById('multiTable');
        let labels=[], datasets=[];
        for(let c=1;c<=datasetCount;c++) datasets.push({label:'Dataset '+c, data:[], backgroundColor:`rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.5)`});

        for(let r=0;r<table.rows.length;r++){
            labels.push(table.rows[r].cells[0].querySelector('input').value || 'Cat'+(r+1));
            for(let c=1;c<=datasetCount;c++){
                let val = Number(table.rows[r].cells[c].querySelector('input').value) || 0;
                datasets[c-1].data.push(val);
            }
        }

        chart = new Chart(ctx,{
            type: 'bar',
            data:{labels:labels, datasets: datasets},
            options:{
                responsive:true,
                plugins:{legend:{position:'right'}},
                scales:{
                    x:{stacked: type==='componentBar'},
                    y:{stacked: type==='componentBar', beginAtZero:true, precision:0}
                }
            }
        });

        sol.innerHTML = `<h5>${type==='multipleBar'?'Multiple Bar Diagram':'Component (Stacked) Bar Diagram'}</h5>`;
    }
}

function addGuide(type){
    let g = document.getElementById('guide');
    let guides = {
        fd:"Enter raw data. System automatically calculates class intervals, tally, frequency, mid, cumulative frequency, relative frequency, mean, median, mode, and chart above.",
        histogram:"Enter raw data. System will automatically calculate grouped data, frequencies, and histogram.",
        polygon:"Enter raw data. System will automatically create frequency polygon from grouped data.",
        ogive:"Enter raw data. System will calculate cumulative frequencies and draw ogive.",
        simpleBar:"Enter categories and frequencies. Simple bar chart generated automatically.",
        multipleBar:"Enter categories and multiple datasets. Multiple bar chart generated automatically.",
        componentBar:"Enter categories and multiple datasets. Component (stacked) bar chart generated automatically.",
        pie:"Enter categories and frequencies. Pie chart shows percentages and angles.",
        stemLeaf:"Enter raw data. System will generate stem & leaf plot automatically."
    };
    g.innerHTML = "<hr><h6>Guide</h6><p class='small-text'>"+(guides[type]||"")+"</p>";
}
</script>

</body>
</html>
